<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JobSphere — Find Your Next Role</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0b0c10;
  --surface: #13151c;
  --surface2: #1c1f2b;
  --border: #252836;
  --accent: #e8ff5a;
  --accent2: #5affd4;
  --text: #f0f0f5;
  --muted: #7a7d91;
  --saved-bg: #1a1e12;
  --saved-border: #e8ff5a44;
  --card-hover: #1f2232;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 14px;
  --trans: all 0.25s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, #e8ff5a18 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, #5affd415 0%, transparent 55%);
}

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 2.5rem;
  border-bottom: 1px solid var(--border);
  background: rgba(11,12,16,0.85);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
.logo {
  font-family: var(--font-head);
  font-size: 1.5rem; font-weight: 800;
  letter-spacing: -0.04em;
}
.logo span { color: var(--accent); }
.nav-links { display: flex; gap: 2rem; }
.nav-links a {
  color: var(--muted); text-decoration: none;
  font-size: 0.9rem; font-weight: 500;
  transition: var(--trans);
}
.nav-links a:hover { color: var(--text); }
.nav-btn {
  background: var(--accent); color: #0b0c10;
  border: none; padding: 0.55rem 1.3rem;
  border-radius: 50px; font-family: var(--font-head);
  font-weight: 700; font-size: 0.85rem;
  cursor: pointer; transition: var(--trans);
  letter-spacing: 0.02em;
}
.nav-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #e8ff5a55; }

.hero {
  padding: 4.5rem 2.5rem 2rem;
  text-align: center;
  animation: fadeDown 0.7s ease both;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hero-eyebrow {
  display: inline-block;
  background: #e8ff5a15;
  border: 1px solid #e8ff5a30;
  color: var(--accent);
  font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.35rem 1rem; border-radius: 50px;
  margin-bottom: 1.4rem;
}
.hero h1 {
  font-family: var(--font-head);
  font-size: clamp(2.4rem, 6vw, 4.2rem);
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -0.04em;
  margin-bottom: 1rem;
}
.hero h1 em { color: var(--accent); font-style: normal; }
.hero p {
  color: var(--muted); font-size: 1rem;
  max-width: 520px; margin: 0 auto 2.5rem;
  font-weight: 300; line-height: 1.7;
}

.search-area {
  max-width: 860px; margin: 0 auto;
  padding: 0 2.5rem 2rem;
  animation: fadeUp 0.7s 0.15s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.search-bar {
  display: flex; align-items: center;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 0.6rem 0.6rem 0.6rem 1.5rem;
  gap: 0.8rem;
  transition: var(--trans);
  margin-bottom: 1.2rem;
}
.search-bar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px #e8ff5a18;
}
.search-icon { color: var(--muted); font-size: 1rem; flex-shrink: 0; }
.search-bar input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--font-body); font-size: 0.95rem;
}
.search-bar button {
  background: var(--accent); color: #0b0c10;
  border: none; padding: 0.65rem 1.6rem;
  border-radius: 50px; font-family: var(--font-head);
  font-weight: 700; font-size: 0.85rem; cursor: pointer;
}

.main-wrapper {
  max-width: 1140px; margin: 0 auto;
  padding: 0 2.5rem 4rem;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 2rem;
}

.jobs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.2rem;
}

.job-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem;
  transition: var(--trans);
  cursor: pointer;
}

.saved-panel {
  background: var(--surface);
  border: 1.5px solid var(--saved-border);
  border-radius: var(--radius);
  padding: 1.5rem;
}

footer {
  border-top: 1px solid var(--border);
  text-align: center; padding: 1.5rem;
  color: var(--muted); font-size: 0.8rem;
}
</style>
</head>
<body>

<nav>
  <div class="logo">Job<span>Sphere</span></div>
  <div class="nav-links">
    <a href="#">Browse Jobs</a>
    <a href="#">Companies</a>
    <a href="#">Salary Guide</a>
    <a href="#">Blog</a>
  </div>
  <button class="nav-btn">Post a Job</button>
</nav>

<section class="hero">
  <span class="hero-eyebrow">✦ 12,400+ active listings</span>
  <h1>Find work that<br><em>actually fits</em> you</h1>
  <p>Discover roles across top companies, filter by salary, location, and role — then bookmark your favorites.</p>
</section>

<div class="search-area">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search job title, skill, or keyword…"/>
    <button onclick="applyFilters()">Search</button>
  </div>
</div>

<div class="main-wrapper">
  <div class="jobs-grid" id="jobGrid"></div>

  <aside class="saved-panel">
    <div class="panel-head">
      <p>Saved Jobs <span id="savedCount">0</span></p>
      <button onclick="clearSaved()">Clear all</button>
    </div>
    <div id="savedList"></div>
  </aside>
</div>

<footer>Made with ♥ for <strong>61 CS 401 – Advanced Web Development</strong></footer>

<script>
const jobs = [
  { id:1,title:"Senior Frontend Engineer",company:"Google",location:"Mountain View",type:"Hybrid",salary:"$165k–$210k",role:"Frontend" }
];

let savedJobs = [];

function renderGrid() {
  const grid = document.getElementById("jobGrid");
  grid.innerHTML = jobs.map(j => `
    <div class="job-card">
      <div>${j.title}</div>
      <div>${j.company}</div>
      <button onclick="toggleSave(${j.id})">Save</button>
    </div>
  `).join("");
}

function toggleSave(id) {
  const job = jobs.find(j => j.id === id);
  if (!savedJobs.includes(job)) savedJobs.push(job);
  renderSaved();
}

function renderSaved() {
  const list = document.getElementById("savedList");
  list.innerHTML = savedJobs.map(j => `<div>${j.title}</div>`).join("");
}

function clearSaved() {
  savedJobs = [];
  renderSaved();
}

renderGrid();
</script>

</body>
</html>
